name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # runs once a day at midnight UTC
  workflow_dispatch: {}   # allows manual run from the Actions tab
  push:
    branches:
      - main              # regenerate on every push to main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate the snake game from GitHub contribution grid
        uses: Platane/snk@v3
        with:
          github_user_name: TheReal-Diego
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
